version: "3.9"

services:
  backend:
    image: ghcr.io/fedal-nl/cashier_backend_api:latest
    container_name: cashier_backend
    restart: always
    labels:
      autoheal: "true"
  
    volumes:
      - ./staticfiles:/app/staticfiles

    command: >
      sh -c "
      uv run python manage.py makemigrations &&
      uv run python manage.py migrate &&
      uv run python manage.py collectstatic --noinput &&
      uv run gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2 --timeout 30
      "

    ports:
      - "8000:8000"

    env_file:
      - .env

    # optional but recommended
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: cashier_autoheal
    restart: always
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_START_PERIOD: 60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
