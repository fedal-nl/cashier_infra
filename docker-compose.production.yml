version: "3.9"

services:
  db:
    image: postgres:15
    container_name: cashier_db
    restart: always
    labels:
      autoheal: "true"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    image: ghcr.io/fedal-nl/cashier_backend_api:latest
    container_name: cashier_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
  
    volumes:
      - ./staticfiles:/app/staticfiles

    command: >
      sh -c "
      uv run python manage.py makemigrations &&
      uv run python manage.py migrate &&
      uv run python manage.py collectstatic --noinput &&
      uv run gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2 --timeout 30
      "

    ports:
      - "8000:8000"

    env_file:
      - .env
    environment:
      DB_HOST: db

    # optional but recommended
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "--max-time", "10", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 12s
      retries: 3
      start_period: 60s

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: cashier_autoheal
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_START_PERIOD: 60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # Watches the backend Docker health status. If the API becomes unhealthy,
  # restart Postgres first and then the backend, because some API outages only
  # recovered after the full API/database pair was restarted.
  api-stack-autoheal:
    image: docker:27-cli
    container_name: cashier_api_stack_autoheal
    restart: always
    depends_on:
      - backend
      - db
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      WATCH_CONTAINER: cashier_backend
      DB_CONTAINER: cashier_db
      BACKEND_CONTAINER: cashier_backend
      CHECK_INTERVAL: 30
      RESTART_COOLDOWN: 180
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Poll the backend health status through Docker. On unhealthy status,
    # restart DB -> wait briefly -> restart backend -> wait before checking again.
    command: >
      sh -c '
      while true; do
        status="$$(docker inspect --format "{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}" "$$WATCH_CONTAINER" 2>/dev/null || echo missing)";
        if [ "$$status" = "unhealthy" ]; then
          echo "$$(date -Iseconds) $$WATCH_CONTAINER is unhealthy. Restarting $$DB_CONTAINER, then $$BACKEND_CONTAINER.";
          docker restart "$$DB_CONTAINER";
          sleep 10;
          docker restart "$$BACKEND_CONTAINER";
          echo "$$(date -Iseconds) Restart completed. Cooling down for $$RESTART_COOLDOWN seconds.";
          sleep "$$RESTART_COOLDOWN";
        else
          sleep "$$CHECK_INTERVAL";
        fi;
      done
      '

volumes:
  postgres_data:
