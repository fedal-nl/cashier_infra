version: "3.9"

services:
  db:
    image: postgres:15
    container_name: cashier_db
    restart: always
    environment:
      POSTGRES_DB: cashier
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REPORTS_DB_USER: ${REPORTS_DB_USER:-cashier_readonly}
      REPORTS_DB_PASSWORD: ${REPORTS_DB_PASSWORD:-cashier_readonly}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./devops/postgres-init:/docker-entrypoint-initdb.d:ro

  backend:
    image: ghcr.io/fedal-nl/cashier_backend_api:latest
    container_name: cashier_backend
    labels:
      autoheal: "true"
    command: >
      sh -c "
      uv run python manage.py makemigrations &&
      uv run python manage.py migrate &&
      uv run python manage.py collectstatic --noinput &&
      uv run gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 30 --max-requests 1000 --max-requests-jitter 100
      "
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - backend_venv:/app/.venv
    env_file: 
      - .env
    environment:
      BACKEND_INSTANCE: backend-1
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend-2:
    image: ghcr.io/fedal-nl/cashier_backend_api:latest
    container_name: cashier_backend_2
    labels:
      autoheal: "true"
    command: >
      sh -c "
      uv run gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 30 --max-requests 1000 --max-requests-jitter 100
      "
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - backend_venv:/app/.venv
    env_file:
      - .env
    environment:
      BACKEND_INSTANCE: backend-2
    depends_on:
      db:
        condition: service_started
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend-3:
    image: ghcr.io/fedal-nl/cashier_backend_api:latest
    container_name: cashier_backend_3
    labels:
      autoheal: "true"
    command: >
      sh -c "
      uv run gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 30 --max-requests 1000 --max-requests-jitter 100
      "
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - backend_venv:/app/.venv
    env_file:
      - .env
    environment:
      BACKEND_INSTANCE: backend-3
    depends_on:
      db:
        condition: service_started
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    # image: ghcr.io/fedal-nl/cashier_frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: cashier_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    #ports:
    #  - "3000:5173"
    command: sh -c "npm install && npm run dev -- --host"
    stdin_open: true
    tty: true
    env_file:
      - .env

  website:
    build:
      context: ./aklahlana-website
      dockerfile: Dockerfile.dev
    container_name: aklahlana_website
    volumes:
      - ./aklahlana-website:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    stdin_open: true
    tty: true
    env_file:
      - .env

  reports:
    build:
      context: ./cashier-reports
      dockerfile: Dockerfile
    container_name: cashier_reports
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./cashier-reports:/app
    environment:
      REPORTS_DB_NAME: ${DB_NAME:-cashier}
      REPORTS_DB_USER: ${REPORTS_DB_USER:-cashier_readonly}
      REPORTS_DB_PASSWORD: ${REPORTS_DB_PASSWORD:-cashier_readonly}
      REPORTS_DB_HOST: db
      REPORTS_DB_PORT: ${DB_PORT:-5432}
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: cashier_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
    depends_on:
      - backend
      - backend-2
      - backend-3
      - frontend
      - website
      - reports

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: cashier_autoheal
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_START_PERIOD: 60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
  static_volume:
  backend_venv:
