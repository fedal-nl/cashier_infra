version: "3.9"

services:
  db:
    image: postgres:15
    container_name: cashier_db
    restart: always
    environment:
      POSTGRES_DB: cashier
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: ghcr.io/fedal-nl/cashier_backend_api:latest
    container_name: cashier_backend
    command: >
      sh -c "
      uv run python manage.py migrate &&
      uv run python manage.py collectstatic --noinput &&
      uv run python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
    env_file: 
      - .env
    depends_on:
      - db

  frontend:
    image: ghcr.io/fedal-nl/cashier_frontend:latest
    container_name: cashier_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true

  nginx:
    image: nginx:alpine
    container_name: cashier_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  static_volume: